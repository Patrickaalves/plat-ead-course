server:
    port: 8082
    servlet:
      context-path: '/ead-course/'

spring:
  application:
    name: course
  datasource:
    url: jdbc:postgresql://localhost:5433/ead-course
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
      jdbc:
        lob.non_contextual_creation: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true